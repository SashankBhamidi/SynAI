name: Deploy to Production

# 🔒 DEPLOYMENT SAFETY: 
# - Only runs on master branch pushes (never on PRs)
# - Requires all tests to pass
# - Requires manual approval via GitHub environment protection
on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docs/**'

jobs:
  # First run all quality checks
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type checking
        run: npm run typecheck
      
      - name: Lint code
        run: npm run lint:check
      
      - name: Run test suite
        run: npm run test:coverage
      
      - name: Build verification
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Archive coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/

  # Deploy only after quality gate passes
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: quality-gate
    
    # Require manual approval for production deployments
    environment:
      name: production
      url: https://synai.site
    
    # Additional safety checks
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
      
      - name: Comment deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = 'https://synai.site';
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Successfully deployed to [${deploymentUrl}](${deploymentUrl})`
            });
            
            core.info(`Deployed to: ${deploymentUrl}`);