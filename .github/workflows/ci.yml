name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.6.0
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3.8.1
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run type checking
        run: npm run typecheck
      
      - name: Run linting (allow warnings)
        run: npm run lint:check || echo "Linting completed with warnings"
        continue-on-error: true
      
      - name: Run tests
        run: npm run test -- --coverage
      
      # Only upload coverage on master branch pushes (not PRs)
      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: codecov/codecov-action@v3.1.4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Build verification job - only runs on master pushes, not PRs  
  build-check:
    runs-on: ubuntu-latest
    needs: test
    # Only verify build on master branch pushes (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.6.0
      
      - name: Use Node.js 20
        uses: actions/setup-node@v3.8.1
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify build works
        run: npm run build
        env:
          NODE_ENV: production